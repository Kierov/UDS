<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
      font-family: monospace;
    }

    #status-bar {
      pointer-events: all;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      color: #00ff88;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid #00ff8844;
    }

    #status-text {
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    #marker-status {
      font-size: 12px;
      color: #ffffff88;
    }

    #test-btn {
      background: #00ff88;
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    #test-btn:active {
      background: #00cc66;
    }

    #corner-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      color: #00ff88;
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid #00ff8844;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #log {
      position: absolute;
      top: 50px; left: 16px;
      color: #ffffff99;
      font-size: 11px;
      max-width: 260px;
    }
  </style>
</head>

<body style="margin:0; overflow:hidden">

  <!-- AR Scene -->
  <a-scene embedded arjs>
    <a-marker type="pattern" url="./marker.patt" id="marker">
      <a-entity
        gltf-model="./model.glb"
        position="0 0 0"
        scale="0.1 0.1 0.1">
      </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Always-visible overlay -->
  <div id="overlay">

    <div id="corner-badge">UDS · AR</div>

    <div id="log">
      <div id="marker-status">⬜ Marker: not detected</div>
    </div>

    <div id="status-bar">
      <span id="status-text">📷 Camera active — point at marker</span>
      <button id="test-btn" onclick="testClick()">TEST ✓</button>
    </div>

  </div>

  <script>
    // Test button — confirms JS and overlay are working
    function testClick() {
      document.getElementById('status-text').textContent = '✅ UI is working!';
      document.getElementById('test-btn').textContent = 'OK ✓';
    }

    // Listen for marker found/lost events
    document.addEventListener('DOMContentLoaded', () => {
      const marker = document.getElementById('marker');
      const markerStatus = document.getElementById('marker-status');
      const statusText = document.getElementById('status-text');

      if (marker) {
        marker.addEventListener('markerFound', () => {
          markerStatus.textContent = '🟢 Marker: DETECTED';
          markerStatus.style.color = '#00ff88';
          statusText.textContent = '🎯 Marker found — loading model...';
        });
        marker.addEventListener('markerLost', () => {
          markerStatus.textContent = '⬜ Marker: lost';
          markerStatus.style.color = '#ffffff88';
          statusText.textContent = '📷 Camera active — point at marker';
        });
      }
    });
  </script>

</body>
</html>
